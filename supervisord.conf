[supervisord]
nodaemon=true
user=root
logfile=/dev/stdout
logfile_maxbytes=0

[program:loftgw]
command=/app/loftgw
directory=/root
autostart=true
autorestart=true
# 增强稳定性：程序跑满 5 秒才算启动成功
startsecs=5
# 增强稳定性：失败后最多重试 10 次（默认是 3 次）
startretries=10
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

[program:cloudflared]
command=/app/cloudflared tunnel --no-autoupdate run --token %(ENV_tunnelid)s
directory=/app
autostart=true
autorestart=true
startsecs=5
startretries=10
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
