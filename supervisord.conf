[supervisord]
nodaemon=true
user=root
logfile=/dev/stdout
logfile_maxbytes=0

[program:loftgw]
command=/app/loftgw
directory=/root
environment=GOMEMLIMIT="300MiB",GOGC="60",MALLOC_ARENA_MAX="2"
autostart=true
autorestart=true
# 增强稳定性：程序跑满 5 秒才算启动成功
startsecs=5
# 增强稳定性：失败后最多重试 10 次（默认是 3 次）
startretries=10
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

[program:cloudflared]
# 使用 http2 协议替代 quic，大幅降低小内存容器的内存占用，并适配各种 PaaS 平台的 UDP 限制
command=/app/cloudflared tunnel --no-autoupdate --protocol http2 run --token %(ENV_tunnelid)s
directory=/app
environment=GOMEMLIMIT="128MiB",GOGC="50",MALLOC_ARENA_MAX="1"
autostart=true
autorestart=true
startsecs=5
startretries=10
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
